<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    nav {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-left { font-size: 1.1rem; font-weight: 700; color: #1a1a1a; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: .9rem;
    }

    .nav-user { color: #555; }

    .tag {
      padding: .25rem .7rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
    }
    .tag-commun { background: #e5e7eb; color: #374151; }
    .tag-plus   { background: #dbeafe; color: #1d4ed8; }
    .tag-admin  { background: #fee2e2; color: #b91c1c; }

    .btn-deconnexion {
      padding: .35rem .9rem;
      background: transparent;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: .85rem;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-deconnexion:hover { background: #f1f5f9; }

    .main {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 61px);
    }

    .placeholder {
      text-align: center;
      color: #999;
    }

    .placeholder .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .placeholder h2 {
      font-size: 1.3rem;
      color: #555;
      margin-bottom: .5rem;
    }

    .placeholder p {
      font-size: .9rem;
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-left">Hub</span>
    <div class="nav-right">
      <span class="nav-user" id="nav-username"></span>
      <span class="tag" id="nav-niveau"></span>
      <button class="btn-deconnexion" onclick="deconnexion()">Se déconnecter</button>
    </div>
  </nav>

  <div class="main">
    <div class="placeholder">
      <div class="icon">🚧</div>
      <h2>Aucune fonctionnalité pour l'instant</h2>
      <p>Les fonctionnalités seront ajoutées prochainement.</p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://uqjciekcfrxscfwztttt.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_Ly-L4hecBE_r-k4qd5zTkQ_VmaKUASz'
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    const username = localStorage.getItem('username')
    const niveau   = localStorage.getItem('niveau') ?? 'commun'

    if (!username) {
      window.location.href = 'connexion.html'
    }

    document.getElementById('nav-username').textContent = username
    const niveauEl = document.getElementById('nav-niveau')
    niveauEl.textContent = niveau
    niveauEl.className = 'tag tag-' + niveau

    window.deconnexion = async function() {
      await db.auth.signOut()
      localStorage.removeItem('username')
      localStorage.removeItem('niveau')
      window.location.href = 'index.html'
    }
  </script>

</body>
</html>
