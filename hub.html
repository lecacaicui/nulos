<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 4rem;
    }
    .placeholder {
      text-align: center;
      color: #999;
    }
    .placeholder .icon { font-size: 3rem; margin-bottom: 1rem; }
    .placeholder h2 { font-size: 1.3rem; color: #555; margin-bottom: .5rem; }
    .placeholder p { font-size: .9rem; }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="placeholder">
      <div class="icon">🚧</div>
      <h2>Aucune fonctionnalité pour l'instant</h2>
      <p>Les fonctionnalités seront ajoutées prochainement.</p>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script>
    if (!localStorage.getItem('username')) window.location.href = 'connexion.html'
    fetch('header.html').then(r => r.text()).then(h => document.getElementById('header-placeholder').innerHTML = h)
    fetch('footer.html').then(r => r.text()).then(f => document.getElementById('footer-placeholder').innerHTML = f)
  </script>
</body>
</html>
