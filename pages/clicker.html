<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clicker</title>
  <link rel="stylesheet" href="../style/style.css">
  <script>
  (function(){
    var t = localStorage.getItem('theme_couleurs');
    if (!t) return;
    try {
      var c = JSON.parse(t);
      var r = document.documentElement.style;
      r.setProperty('--couleur-fond', c.couleur_fond);
      r.setProperty('--couleur-conteneur', c.couleur_conteneur);
      r.setProperty('--couleur-bordure', c.couleur_bordure);
      r.setProperty('--couleur-bouton', c.couleur_bouton);
      var h = c.couleur_fond.replace('#','');
      var lum = (0.299*parseInt(h.substring(0,2),16) + 0.587*parseInt(h.substring(2,4),16) + 0.114*parseInt(h.substring(4,6),16)) / 255;
      r.setProperty('--couleur-texte', lum < 0.5 ? '#f1f1f1' : '#1a1a1a');
      r.setProperty('--couleur-texte-faible', lum < 0.5 ? '#9ca3af' : '#6b7280');
    } catch(e) {}
  })();
  </script>

  <style>body { visibility: hidden; }</style>
  <style>
    .clicker-wrap { width: 100%; padding: 2rem 2.5rem 6rem; }
    .clicker-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2rem; align-items: start; }
    .col-ameliorations { display: flex; flex-direction: column; gap: 1rem; }
    .clicker-main { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .col-droite { display: flex; flex-direction: column; gap: 1.5rem; }
    .classement { background: var(--couleur-conteneur); border: 1px solid var(--couleur-bordure); border-radius: 12px; padding: 1rem 1.1rem; }
    @media (max-width: 900px) {
      .clicker-grid { grid-template-columns: 1fr; }
    }
    .classement-titre { font-size: .8rem; font-weight: 600; color: var(--couleur-texte-faible); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .75rem; }
    .classement-ligne { display: flex; align-items: center; gap: .6rem; padding: .4rem 0; border-bottom: 1px solid var(--couleur-bordure); font-size: .85rem; }
    .classement-ligne:last-child { border-bottom: none; }
    .classement-rang { font-weight: 600; color: var(--couleur-texte-faible); min-width: 20px; }
    .classement-rang.or { color: #f59e0b; }
    .classement-rang.argent { color: #9ca3af; }
    .classement-rang.bronze { color: #b45309; }
    .classement-nom { flex: 1; color: var(--couleur-texte); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .classement-score { color: var(--couleur-texte-faible); font-size: .8rem; white-space: nowrap; }
    .classement-moi { background: var(--couleur-fond); border-radius: 6px; }
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; }
    .stat-card { background: var(--couleur-conteneur); border: 1px solid var(--couleur-bordure); border-radius: 10px; padding: .85rem 1rem; }
    .stat-label { font-size: .75rem; color: var(--couleur-texte-faible); margin-bottom: .25rem; }
    .stat-value { font-size: 1.3rem; font-weight: 600; color: var(--couleur-texte); }
    .btn-click { background: none; border: none; cursor: pointer; padding: 0; transition: transform .08s; user-select: none; -webkit-user-select: none; }
    .btn-click:active { transform: scale(0.91); }
    .btn-click img { width: 140px; height: 140px; object-fit: contain; display: block; }
    .float { position: absolute; pointer-events: none; font-size: .95rem; font-weight: 600; color: #f59e0b; animation: floatUp .8s ease-out forwards; }
    @keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-60px)} }
    .click-area { position: relative; display: inline-block; }
    .upgrade-card { width: 100%; background: var(--couleur-conteneur); border: 1px solid var(--couleur-bordure); border-radius: 12px; padding: 1rem 1.1rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; transition: filter .12s; }
    .upgrade-card:hover:not(.disabled) { filter: brightness(.95); }
    .upgrade-card.disabled { opacity: .5; cursor: not-allowed; }
    .upgrade-img { width: 52px; height: 52px; object-fit: contain; flex-shrink: 0; }
    .upgrade-info { flex: 1; }
    .upgrade-name { font-size: .95rem; font-weight: 600; color: var(--couleur-texte); }
    .upgrade-desc { font-size: .8rem; color: var(--couleur-texte-faible); margin-top: .15rem; }
    .upgrade-count { font-size: .75rem; color: var(--couleur-bouton); margin-top: .25rem; font-weight: 600; }
    .upgrade-cost { font-size: .9rem; font-weight: 600; color: var(--couleur-bouton); white-space: nowrap; display: flex; align-items: center; gap: 4px; }
    .section-title { font-size: .8rem; font-weight: 600; color: var(--couleur-texte-faible); text-transform: uppercase; letter-spacing: .05em; align-self: flex-start; }
    .saving { font-size: .75rem; color: var(--couleur-texte-faible); }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <div class="clicker-wrap">

      <div class="clicker-grid">

        <div class="col-ameliorations">
          <div class="section-title">Améliorations</div>
          <div class="upgrade-card disabled" id="upgrade-card" onclick="acheterUpgrade()">
            <img class="upgrade-img" src="../pictures/nrv.png" alt="nrv" style="width:100px;height:100px;" >
            <div class="upgrade-info">
              <div class="upgrade-name">Boost de rage</div>
              <div class="upgrade-desc" id="upgrade-desc">+2 pièces / clic</div>
              <div class="upgrade-count" id="upgrade-count">Pas encore achetée</div>
            </div>
            <div class="upgrade-cost" id="upgrade-cost">25</div>
          </div>
        </div>

        <div class="clicker-main">
          <div class="click-area" id="click-area">
            <button class="btn-click" id="btn-click" aria-label="Cliquer pour gagner des pièces">
              <img src="../pictures/pas_content.png" alt="pas_content">
            </button>
          </div>
          <div class="saving" id="saving-status">Sauvegarde…</div>
        </div>

        <div class="col-droite">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">Pièces actuelles</div>
              <div class="stat-value" id="stat-pieces">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Par clic</div>
              <div class="stat-value" id="stat-par-clic">1</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Total produit</div>
              <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Clics totaux</div>
              <div class="stat-value" id="stat-clics">0</div>
            </div>
          </div>

          <div class="classement">
            <div class="classement-titre">🏆 Top 5 — Total produit</div>
            <div id="classement-liste">
              <div style="font-size:.8rem;color:var(--couleur-texte-faible);">Chargement…</div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
  <div id="footer-placeholder"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
    import { chargerHeader, chargerFooter, appliquerTheme } from '../script/header.js'

    const db = createClient('https://uqjciekcfrxscfwztttt.supabase.co', 'sb_publishable_Ly-L4hecBE_r-k4qd5zTkQ_VmaKUASz')

    ;(async () => {
      if (!localStorage.getItem('username')) {
        window.location.href = 'connexion.html'
        return
      }
      // Le thème est déjà appliqué par le snippet inline dans <head> :
      // on rend le body visible immédiatement, sans attendre Supabase.
      document.body.style.setProperty('visibility', 'visible', 'important')
      appliquerTheme()  // arrière-plan, met à jour le cache sans bloquer
      await chargerHeader('../')
      await chargerFooter('../')
      await chargerSauvegarde()
    })()

    let pieces       = 0
    let totalProduit = 0
    let totalClics   = 0
    let nbUpgrades   = 0
    let parClic      = 1
    let coutUpgrade  = 25
    let bonusUpgrade = 2
    let saveTimer    = null
    let userId       = null

    async function chargerSauvegarde() {
      const { data: session } = await db.auth.getUser()
      if (!session?.user) return
      userId = session.user.id

      const { data } = await db.from('clicker').select('*').eq('user_id', userId).single()
      if (data) {
        pieces       = data.pieces_actuelles ?? 0
        totalProduit = data.pieces_totales   ?? 0
        totalClics   = data.total_clics      ?? 0
        nbUpgrades   = data.nb_upgrades      ?? 0
        recalculerEtat()
      }
      majAffichage()
      document.getElementById('saving-status').textContent = 'Sauvegarde chargée'
      await chargerClassement()
    }

    function recalculerEtat() {
      parClic      = 1
      coutUpgrade  = 25
      bonusUpgrade = 2
      for (let i = 0; i < nbUpgrades; i++) {
        parClic      += bonusUpgrade
        bonusUpgrade += 3
        coutUpgrade   = Math.ceil(coutUpgrade * 1.4)
      }
    }

    document.getElementById('btn-click').addEventListener('click', (e) => {
      pieces       += parClic
      totalProduit += parClic
      totalClics   += 1
      majAffichage()
      afficherFloat(e, '+' + parClic)
      planifierSauvegarde()
    })

    window.acheterUpgrade = function() {
      if (pieces < coutUpgrade) return
      pieces     -= coutUpgrade
      nbUpgrades += 1
      recalculerEtat()
      majAffichage()
      planifierSauvegarde()
    }

    function majAffichage() {
      document.getElementById('stat-pieces').textContent   = pieces.toLocaleString('fr')
      document.getElementById('stat-par-clic').textContent = parClic.toLocaleString('fr')
      document.getElementById('stat-total').textContent    = totalProduit.toLocaleString('fr')
      document.getElementById('stat-clics').textContent    = totalClics.toLocaleString('fr')
      document.getElementById('upgrade-cost').innerHTML    = coutUpgrade.toLocaleString('fr') + ' <img src="../pictures/pascontentpiece.png" style="width:50px;height:50px;object-fit:contain;vertical-align:middle;">'
      document.getElementById('upgrade-desc').textContent  = '+' + bonusUpgrade + ' pièces / clic (total : ' + (parClic + bonusUpgrade) + ')'
      document.getElementById('upgrade-count').textContent = nbUpgrades > 0 ? 'Achetée ' + nbUpgrades + ' fois' : 'Pas encore achetée'
      document.getElementById('upgrade-card').classList.toggle('disabled', pieces < coutUpgrade)
    }

    function afficherFloat(e, texte) {
      const area = document.getElementById('click-area')
      const rect = area.getBoundingClientRect()
      const span = document.createElement('span')
      span.className = 'float'
      span.innerHTML = `${texte} <img src="../pictures/pascontentpiece.png" style="width:50px;height:50px;object-fit:contain;vertical-align:middle;">`
      span.style.left = (e.clientX - rect.left - 10) + 'px'
      span.style.top  = (e.clientY - rect.top  - 20) + 'px'
      area.appendChild(span)
      span.addEventListener('animationend', () => span.remove())
    }

    function planifierSauvegarde() {
      clearTimeout(saveTimer)
      document.getElementById('saving-status').textContent = 'Modification en cours…'
      saveTimer = setTimeout(sauvegarder, 2000)
    }

    async function chargerClassement() {
      const { data, error } = await db.from('clicker')
        .select('user_id, pieces_totales')
        .order('pieces_totales', { ascending: false })
        .limit(5)
      if (error || !data) return

      const ids = data.map(r => r.user_id)
      const { data: profils } = await db.from('profils')
        .select('user_id, username')
        .in('user_id', ids)

      const map = {}
      profils?.forEach(p => map[p.user_id] = p.username)

      const rangs = ['🥇', '🥈', '🥉', '4', '5']
      const rangClasses = ['or', 'argent', 'bronze', '', '']

      const liste = document.getElementById('classement-liste')
      liste.innerHTML = data.map((r, i) => {
        const nom    = map[r.user_id] ?? '???'
        const estMoi = r.user_id === userId
        const score  = r.pieces_totales.toLocaleString('fr')
        return `
          <div class="classement-ligne ${estMoi ? 'classement-moi' : ''}">
            <span class="classement-rang ${rangClasses[i]}">${rangs[i]}</span>
            <span class="classement-nom">${nom}</span>
            <span class="classement-score">${score}</span>
          </div>`
      }).join('')
    }

    async function sauvegarder() {
      if (!userId) return
      const payload = {
        user_id:          userId,
        pieces_actuelles: pieces,
        pieces_totales:   totalProduit,
        total_clics:      totalClics,
        nb_upgrades:      nbUpgrades
      }
      const { error } = await db.from('clicker').upsert(payload, { onConflict: 'user_id' })
      document.getElementById('saving-status').textContent = error ? '✗ Erreur de sauvegarde' : '✓ Sauvegardé'
    }
  </script>
</body>
</html>
