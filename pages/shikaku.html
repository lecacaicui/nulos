<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shikaku</title>
  <link rel="stylesheet" href="../style/style.css">
  <script>
  (function(){
    var t = localStorage.getItem('theme_couleurs');
    if (!t) return;
    try {
      var c = JSON.parse(t);
      var r = document.documentElement.style;
      r.setProperty('--couleur-fond', c.couleur_fond);
      r.setProperty('--couleur-conteneur', c.couleur_conteneur);
      r.setProperty('--couleur-bordure', c.couleur_bordure);
      r.setProperty('--couleur-bouton', c.couleur_bouton);
      var h = c.couleur_fond.replace('#','');
      var lum = (0.299*parseInt(h.substring(0,2),16) + 0.587*parseInt(h.substring(2,4),16) + 0.114*parseInt(h.substring(4,6),16)) / 255;
      r.setProperty('--couleur-texte', lum < 0.5 ? '#f1f1f1' : '#1a1a1a');
      r.setProperty('--couleur-texte-faible', lum < 0.5 ? '#9ca3af' : '#6b7280');
    } catch(e) {}
  })();
  </script>
  <style>body { visibility: hidden; }</style>
  <style>
    .shikaku-wrap {
      max-width: 580px;
      margin: 0 auto;
      padding: 2rem 1rem 7rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
    }
    .shikaku-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .shikaku-header h1 { margin-bottom: 0; }
    .niveau-btns { display: flex; gap: .5rem; flex-wrap: wrap; }
    .niveau-btn {
      padding: .35rem .9rem;
      border-radius: 7px;
      font-size: .82rem;
      font-weight: 600;
      border: 1px solid var(--couleur-bordure);
      background: var(--couleur-fond);
      color: var(--couleur-texte);
      cursor: pointer;
      transition: filter .15s, background .15s;
    }
    .niveau-btn:hover { filter: brightness(.92); }
    .niveau-btn.actif { background: var(--couleur-bouton); color: white; border-color: var(--couleur-bouton); }
    .shikaku-info {
      font-size: .82rem;
      color: var(--couleur-texte-faible);
      text-align: center;
      line-height: 1.5;
    }
    .grille-container { position: relative; user-select: none; touch-action: none; }
    canvas { display: block; border-radius: 6px; cursor: crosshair; }
    .shikaku-controls { display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center; }
    .shikaku-msg {
      font-size: .82rem;
      min-height: 1.2em;
      text-align: center;
      color: #ef4444;
    }
    .shikaku-msg.ok { color: #22c55e; }

    .victoire-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .victoire-overlay.visible { display: flex; }
    .victoire-carte {
      background: var(--couleur-conteneur);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 8px 30px rgba(0,0,0,.3);
    }
    .victoire-emoji { font-size: 3rem; margin-bottom: .75rem; }
    .victoire-titre { font-size: 1.4rem; font-weight: 700; margin-bottom: .5rem; }
    .victoire-sous { font-size: .9rem; color: var(--couleur-texte-faible); margin-bottom: 1.5rem; }
    .victoire-btns { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }

    /* ===== Tooltip dimensions (drag & drop) ===== */
    #drag-tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(20, 20, 30, 0.88);
      color: #fff;
      font-size: .78rem;
      font-weight: 600;
      padding: .25rem .55rem;
      border-radius: 6px;
      white-space: nowrap;
      display: none;
      z-index: 9999;
      transform: translate(14px, -110%);
      letter-spacing: .02em;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <div class="shikaku-wrap">
      <div class="shikaku-header">
        <h1>Shikaku</h1>
        <div class="niveau-btns">
          <button class="niveau-btn" onclick="demarrer(5)">5×5</button>
          <button class="niveau-btn" onclick="demarrer(20)">20×20</button>
          <button class="niveau-btn" onclick="demarrer(40)">40×40</button>
        </div>
      </div>
      <p class="shikaku-info">
        Divisez la grille en rectangles. Chaque rectangle doit contenir exactement le chiffre affiché, qui indique son aire.<br>
        Cliquez-glissez pour dessiner. Cliquez sur un rectangle existant pour l'effacer.
      </p>
      <div class="grille-container">
        <canvas id="canvas"></canvas>
      </div>
      <div class="shikaku-controls">
        <button class="btn btn-secondary" onclick="annuler()">↩ Annuler</button>
        <button class="btn btn-secondary" onclick="reinitialiser()">🔄 Réinitialiser</button>
        <button class="btn btn-primary"   onclick="verifier()">✓ Vérifier</button>
        <button class="btn btn-secondary" onclick="demarrer(TAILLE)">🎲 Nouveau</button>
      </div>
      <div class="shikaku-msg" id="msg"></div>
    </div>
  </main>
  <div id="footer-placeholder"></div>

  <div class="victoire-overlay" id="victoire-overlay">
    <div class="victoire-carte">
      <div class="victoire-emoji">🎉</div>
      <div class="victoire-titre">Bravo !</div>
      <div class="victoire-sous" id="victoire-sous">Puzzle résolu !</div>
      <div class="victoire-btns">
        <button class="btn btn-secondary" onclick="fermerVictoire()">Fermer</button>
        <button class="btn btn-primary"   onclick="demarrer(TAILLE)">🎲 Nouveau puzzle</button>
      </div>
    </div>
  </div>

  <div id="drag-tooltip"></div>

  <script type="module">
    import { chargerHeader, chargerFooter, appliquerTheme } from '../script/header.js'
    ;(async () => {
      if (!localStorage.getItem('username')) { window.location.href = 'connexion.html'; return }
      document.body.style.setProperty('visibility', 'visible', 'important')
      appliquerTheme()
      await chargerHeader('../')
      await chargerFooter('../')
      demarrer(7)
    })()
  </script>

  <script>
  // ─────────────────────────────────────────────────────────────
  // CONSTANTES
  // ─────────────────────────────────────────────────────────────
  const COULEURS = [
    '#6baed6','#c8a96e','#74c476','#d47a7a','#9b7bc4',
    '#6ec8c8','#d4a07e','#5dba8b','#c47aa0','#7a9bc4',
    '#d4c87e','#b47eb4','#7ebdb4','#c4927e','#8fa0c8',
    '#e08060','#60a0c8','#a0c860','#c860a0','#80c8a0'
  ]

  // ─────────────────────────────────────────────────────────────
  // ÉTAT GLOBAL
  // ─────────────────────────────────────────────────────────────
  let TAILLE     = 7
  let CELL       = 60
  let solution   = []
  let indices    = []
  let rectangles = []
  let historique = []
  let dessin     = null
  let startCell  = null
  let canvas, ctx

  // ─────────────────────────────────────────────────────────────
  // GÉNÉRATION DU PUZZLE
  // ─────────────────────────────────────────────────────────────

  /** Aire maximale d'un rectangle selon la taille de grille. */
  function aireMaxPour(n) {
    if (n <= 5)  return 5
    if (n <= 8)  return 8
    if (n <= 12) return 12
    if (n <= 20) return 16
    return 22
  }

  /**
   * Génère une partition valide de la grille n×n en rectangles.
   * Algorithme glouton haut-gauche : traite les cases dans l'ordre,
   * place un rectangle aléatoire sur la première case libre.
   * Ne peut PAS échouer : la case libre peut toujours être couverte
   * par un rectangle 1×1 au minimum.
   */
  function genererPartition(n) {
    const g    = Array.from({length: n}, () => Array(n).fill(-1))
    const rects = []
    const aMax  = aireMaxPour(n)
    let   id    = 0

    while (true) {
      // Première case libre
      let fr = -1, fc = -1
      outer: for (let r = 0; r < n; r++)
        for (let c = 0; c < n; c++)
          if (g[r][c] === -1) { fr = r; fc = c; break outer }
      if (fr === -1) break

      // Candidats : tous les rectangles valides partant de (fr,fc)
      const cands = []
      for (let r2 = fr; r2 < n; r2++) {
        // Optimisation : si la colonne fc de la ligne r2 est prise, inutile d'aller plus bas
        if (r2 > fr && g[r2][fc] !== -1) break
        for (let c2 = fc; c2 < n; c2++) {
          const aire = (r2 - fr + 1) * (c2 - fc + 1)
          if (aire > aMax) break
          // Vérifie que toutes les cases du rectangle sont libres
          let ok = true
          for (let r = fr; r <= r2 && ok; r++)
            for (let c = fc; c <= c2 && ok; c++)
              if (g[r][c] !== -1) ok = false
          if (ok) cands.push({r1: fr, c1: fc, r2, c2, aire})
        }
      }

      // Sélection pondérée : faveur aux aires moyennes (2-8), évite les 1×1 autant que possible
      const prefer = cands.filter(c => c.aire >= 2)
      const pool   = prefer.length ? prefer : cands
      const w      = pool.map(c => (c.aire >= 2 && c.aire <= 6) ? 3 : (c.aire === 1 ? 0.5 : 1))
      const wSum   = w.reduce((s, x) => s + x, 0)
      let   t      = Math.random() * wSum
      let   choisi = pool[0]
      for (let i = 0; i < pool.length; i++) { t -= w[i]; if (t <= 0) { choisi = pool[i]; break } }

      for (let r = choisi.r1; r <= choisi.r2; r++)
        for (let c = choisi.c1; c <= choisi.c2; c++)
          g[r][c] = id
      rects.push(choisi)
      id++
    }

    return {g, rects}
  }

  /**
   * Place l'indice de chaque rectangle à son CENTRE.
   * Le centre est la position la plus contraignante : elle réduit le
   * nombre de rectangles valides qui peuvent la contenir, rendant la
   * grille beaucoup plus déterministe (et donc solvable de façon unique).
   */
  function placerIndicesCentre(rects) {
    return rects.map(rect => ({
      r:      Math.floor((rect.r1 + rect.r2) / 2),
      c:      Math.floor((rect.c1 + rect.c2) / 2),
      valeur: rect.aire
    }))
  }

  /**
   * Solveur par backtracking : compte le nombre de solutions valides
   * pour la configuration d'indices donnée (s'arrête à maxSol).
   * Utilisé pour vérifier l'unicité sur les petites grilles (≤ 12).
   */
  function compterSolutions(n, idx, maxSol) {
    // Map position → index du clue
    const posMap = new Map()
    idx.forEach((ind, i) => posMap.set(ind.r * n + ind.c, i))

    // Pour chaque indice, lister les rectangles valides :
    //   - contient la case de l'indice
    //   - n'en contient pas d'autres
    //   - dans les limites de la grille
    //   - aire correcte
    const candParInd = idx.map((ind) => {
      const {r, c, valeur: a} = ind
      const res = []
      for (let rows = 1; rows <= Math.min(a, n); rows++) {
        if (a % rows !== 0) continue
        const cols = a / rows
        if (cols > n) continue
        const r1min = Math.max(0, r - rows + 1)
        const r1max = Math.min(n - rows, r)
        for (let r1 = r1min; r1 <= r1max; r1++) {
          const r2 = r1 + rows - 1
          const c1min = Math.max(0, c - cols + 1)
          const c1max = Math.min(n - cols, c)
          for (let c1 = c1min; c1 <= c1max; c1++) {
            const c2 = c1 + cols - 1
            let autreClue = false
            for (let ri = r1; ri <= r2 && !autreClue; ri++)
              for (let ci = c1; ci <= c2 && !autreClue; ci++)
                if ((ri !== r || ci !== c) && posMap.has(ri * n + ci)) autreClue = true
            if (!autreClue) res.push({r1, c1, r2, c2})
          }
        }
      }
      return res
    })

    const grid = Array.from({length: n}, () => Array(n).fill(-1))
    let sols = 0

    function bt(ki) {
      if (sols >= maxSol) return
      if (ki === idx.length) {
        // Vérifier couverture complète
        for (let r = 0; r < n; r++)
          for (let c = 0; c < n; c++)
            if (grid[r][c] === -1) return
        sols++
        return
      }
      for (const rect of candParInd[ki]) {
        let ok = true
        for (let r = rect.r1; r <= rect.r2 && ok; r++)
          for (let c = rect.c1; c <= rect.c2 && ok; c++)
            if (grid[r][c] !== -1) ok = false
        if (!ok) continue
        for (let r = rect.r1; r <= rect.r2; r++)
          for (let c = rect.c1; c <= rect.c2; c++)
            grid[r][c] = ki
        bt(ki + 1)
        for (let r = rect.r1; r <= rect.r2; r++)
          for (let c = rect.c1; c <= rect.c2; c++)
            grid[r][c] = -1
        if (sols >= maxSol) return
      }
    }

    bt(0)
    return sols
  }

  /**
   * Point d'entrée de la génération.
   * Pour les grilles ≤ 12×12 : vérifie l'unicité et relance si nécessaire.
   * Pour les grandes grilles : le placement au centre suffit en pratique.
   */
  function generer(n) {
    const MAX_ESSAIS = 60

    for (let essai = 0; essai < MAX_ESSAIS; essai++) {
      const {g, rects} = genererPartition(n)
      solution = g
      indices  = placerIndicesCentre(rects)

      if (n <= 12) {
        // Vérification d'unicité : on n'accepte que les puzzles à solution unique
        const nsols = compterSolutions(n, indices, 2)
        if (nsols === 1) return
        // Sinon on recommence (nouvelle partition + nouveaux indices)
      } else {
        // Au-delà de 12, le centrage suffit ; on accepte sans vérification
        return
      }
    }

    // Dernier recours : on garde la dernière génération même si non unique
    // (ne devrait arriver que sur de très petites grilles avec peu de rectangles)
  }

  // ─────────────────────────────────────────────────────────────
  // DÉMARRAGE
  // ─────────────────────────────────────────────────────────────
  window.demarrer = function(n) {
    TAILLE     = n
    rectangles = []
    historique = []
    dessin     = null
    startCell  = null

    document.querySelectorAll('.niveau-btn').forEach(b => {
      b.classList.toggle('actif', b.textContent.trim() === n + '×' + n)
    })
    msg('')
    fermerVictoire()

    generer(n)

    canvas = document.getElementById('canvas')
    ctx    = canvas.getContext('2d')
    const maxW = Math.min(window.innerWidth - 40, 720)
    CELL = Math.max(2, Math.floor(maxW / TAILLE))
    canvas.width  = TAILLE * CELL
    canvas.height = TAILLE * CELL

    dessiner()
    bindEvents()
  }

  // ─────────────────────────────────────────────────────────────
  // DESSIN
  // ─────────────────────────────────────────────────────────────
  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim()
  }

  function dessiner() {
    const cFond      = cssVar('--couleur-fond')      || '#f5f5f5'
    const cConteneur = cssVar('--couleur-conteneur') || '#ffffff'
    const cBordure   = cssVar('--couleur-bordure')   || '#e5e7eb'
    const cTexte     = cssVar('--couleur-texte')     || '#1a1a1a'

    // Fond de la grille
    ctx.fillStyle = cConteneur
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    // Rectangles posés par le joueur
    rectangles.forEach(rec => {
      const x = rec.c1 * CELL, y = rec.r1 * CELL
      const w = (rec.c2 - rec.c1 + 1) * CELL, h = (rec.r2 - rec.r1 + 1) * CELL
      ctx.fillStyle   = rec.couleur + 'aa'
      ctx.fillRect(x, y, w, h)
      ctx.strokeStyle = rec.couleur
      ctx.lineWidth   = 2.5
      ctx.setLineDash([])
      ctx.strokeRect(x + 1.5, y + 1.5, w - 3, h - 3)
    })

    // Rectangle en cours de dessin
    if (dessin) {
      const x = dessin.c1 * CELL, y = dessin.r1 * CELL
      const w = (dessin.c2 - dessin.c1 + 1) * CELL, h = (dessin.r2 - dessin.r1 + 1) * CELL
      ctx.fillStyle   = 'rgba(100,150,255,0.18)'
      ctx.fillRect(x, y, w, h)
      ctx.strokeStyle = 'rgba(100,150,255,0.75)'
      ctx.lineWidth   = 2
      ctx.setLineDash([5, 3])
      ctx.strokeRect(x + 1, y + 1, w - 2, h - 2)
      ctx.setLineDash([])
    }

    // Grille (trait fin)
    ctx.strokeStyle = cBordure
    ctx.lineWidth   = 1
    ctx.setLineDash([])
    for (let i = 0; i <= TAILLE; i++) {
      ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke()
    }

    // Indices
    const fontSize = Math.max(11, Math.round(CELL * 0.38))
    indices.forEach(({ r, c, valeur }) => {
      const cx = c * CELL + CELL / 2, cy = r * CELL + CELL / 2
      const rayon = CELL * 0.28
      // Cercle de fond
      ctx.fillStyle   = cConteneur
      ctx.beginPath(); ctx.arc(cx, cy, rayon, 0, Math.PI * 2); ctx.fill()
      ctx.strokeStyle = cBordure
      ctx.lineWidth   = 1.5
      ctx.stroke()
      // Chiffre
      ctx.fillStyle    = cTexte
      ctx.font         = `bold ${fontSize}px system-ui, sans-serif`
      ctx.textAlign    = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText(String(valeur), cx, cy)
    })
  }

  // ─────────────────────────────────────────────────────────────
  // TOOLTIP DIMENSIONS (drag & drop)
  // ─────────────────────────────────────────────────────────────
  const tooltip = document.getElementById('drag-tooltip')

  function afficherTooltip(e, d) {
    if (!d) { masquerTooltip(); return }
    const cols = d.c2 - d.c1 + 1
    const rows = d.r2 - d.r1 + 1
    const aire = cols * rows
    tooltip.textContent = `${cols}×${rows}  |  ${aire}`
    tooltip.style.display = 'block'
    positionnerTooltip(e)
  }

  function positionnerTooltip(e) {
    let x, y
    if (e.touches) {
      x = e.touches[0].clientX
      y = e.touches[0].clientY
    } else {
      x = e.clientX
      y = e.clientY
    }
    // Évite le débordement à droite de l'écran
    const tw = tooltip.offsetWidth
    const marge = 14
    if (x + marge + tw > window.innerWidth) {
      tooltip.style.transform = `translate(${-(tw + marge)}px, -110%)`
    } else {
      tooltip.style.transform = `translate(${marge}px, -110%)`
    }
    tooltip.style.left = x + 'px'
    tooltip.style.top  = y + 'px'
  }

  function masquerTooltip() {
    tooltip.style.display = 'none'
  }

  // ─────────────────────────────────────────────────────────────
  // ÉVÉNEMENTS
  // ─────────────────────────────────────────────────────────────
  function cellDepuis(e) {
    const rect   = canvas.getBoundingClientRect()
    const scaleX = canvas.width  / rect.width
    const scaleY = canvas.height / rect.height
    let px, py
    if (e.touches) {
      px = (e.touches[0].clientX - rect.left) * scaleX
      py = (e.touches[0].clientY - rect.top)  * scaleY
    } else {
      px = (e.clientX - rect.left) * scaleX
      py = (e.clientY - rect.top)  * scaleY
    }
    return {
      r: Math.max(0, Math.min(TAILLE - 1, Math.floor(py / CELL))),
      c: Math.max(0, Math.min(TAILLE - 1, Math.floor(px / CELL)))
    }
  }

  function norm(r1, c1, r2, c2) {
    return { r1: Math.min(r1,r2), c1: Math.min(c1,c2), r2: Math.max(r1,r2), c2: Math.max(c1,c2) }
  }

  function bindEvents() {
    canvas.onmousedown = e => {
      const cell = cellDepuis(e)
      // Clic simple sur un rectangle existant = effacement
      const idx = rectangles.findIndex(r =>
        cell.r >= r.r1 && cell.r <= r.r2 && cell.c >= r.c1 && cell.c <= r.c2
      )
      if (idx !== -1 && e.button === 2) {
        historique.push(rectangles.slice())
        rectangles.splice(idx, 1)
        dessiner()
        return
      }
      startCell = cell
      dessin = { r1: cell.r, c1: cell.c, r2: cell.r, c2: cell.c }
      dessiner()
    }
    canvas.onmousemove = e => {
      if (!startCell) return
      const cell = cellDepuis(e)
      dessin = norm(startCell.r, startCell.c, cell.r, cell.c)
      dessiner()
      afficherTooltip(e, dessin)
    }
    canvas.onmouseup = e => {
      if (!startCell) return
      const cell = cellDepuis(e)
      poserRectangle(norm(startCell.r, startCell.c, cell.r, cell.c))
      startCell = null; dessin = null
      masquerTooltip()
    }
    canvas.onmouseleave = () => { startCell = null; dessin = null; dessiner(); masquerTooltip() }
    canvas.oncontextmenu = e => { e.preventDefault() }

    canvas.ontouchstart = e => { e.preventDefault(); startCell = cellDepuis(e); dessin = { r1: startCell.r, c1: startCell.c, r2: startCell.r, c2: startCell.c }; dessiner(); afficherTooltip(e, dessin) }
    canvas.ontouchmove  = e => { e.preventDefault(); if (!startCell) return; const c = cellDepuis(e); dessin = norm(startCell.r, startCell.c, c.r, c.c); dessiner(); afficherTooltip(e, dessin) }
    canvas.ontouchend   = e => { e.preventDefault(); if (!startCell || !dessin) return; poserRectangle(dessin); startCell = null; dessin = null; masquerTooltip() }
  }

  // ─────────────────────────────────────────────────────────────
  // LOGIQUE JOUEUR
  // ─────────────────────────────────────────────────────────────
  function couleurPour(rec) {
    // Couleur en fonction de la position dans la grille (stable entre redraws)
    const idx = (rec.r1 * TAILLE + rec.c1 + rec.r2 * 3 + rec.c2 * 7) % COULEURS.length
    return COULEURS[idx]
  }

  function poserRectangle(rec) {
    if (!rec) return
    msg('')
    const avant = rectangles.slice()
    // Supprimer les rectangles qui chevauchent
    rectangles = rectangles.filter(r =>
      rec.r2 < r.r1 || rec.r1 > r.r2 || rec.c2 < r.c1 || rec.c1 > r.c2
    )
    historique.push(avant)
    rectangles.push({ ...rec, couleur: couleurPour(rec) })
    dessiner()
  }

  window.annuler = function() {
    if (!historique.length) return
    rectangles = historique.pop()
    msg('')
    dessiner()
  }

  window.reinitialiser = function() {
    historique.push(rectangles.slice())
    rectangles = []
    msg('')
    dessiner()
  }

  function msg(texte, ok = false) {
    const el = document.getElementById('msg')
    el.textContent = texte
    el.className = 'shikaku-msg' + (ok ? ' ok' : '')
  }

  // ─────────────────────────────────────────────────────────────
  // VÉRIFICATION
  // ─────────────────────────────────────────────────────────────
  window.verifier = function() {
    // 1. Couverture complète sans chevauchement
    const couv = Array.from({length: TAILLE}, () => Array(TAILLE).fill(0))
    for (const rec of rectangles)
      for (let r = rec.r1; r <= rec.r2; r++)
        for (let c = rec.c1; c <= rec.c2; c++)
          couv[r][c]++

    for (let r = 0; r < TAILLE; r++)
      for (let c = 0; c < TAILLE; c++)
        if (couv[r][c] !== 1) {
          flashErr(); msg('La grille doit être entièrement couverte, sans chevauchements.'); return
        }

    // 2. Chaque rectangle contient exactement un indice dont la valeur = aire
    for (const rec of rectangles) {
      const aire = (rec.r2 - rec.r1 + 1) * (rec.c2 - rec.c1 + 1)
      const dedans = indices.filter(i => i.r >= rec.r1 && i.r <= rec.r2 && i.c >= rec.c1 && i.c <= rec.c2)
      if (dedans.length !== 1) {
        flashErr(); msg('Chaque rectangle doit contenir exactement un chiffre.'); return
      }
      if (dedans[0].valeur !== aire) {
        flashErr(); msg(`Un rectangle a une aire de ${aire} mais son chiffre indique ${dedans[0].valeur}.`); return
      }
    }

    // Gagné !
    document.getElementById('victoire-sous').textContent = `Grille ${TAILLE}×${TAILLE} résolue ! 🎊`
    document.getElementById('victoire-overlay').classList.add('visible')
  }

  function flashErr() {
    ctx.fillStyle = 'rgba(220,38,38,0.15)'
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    setTimeout(dessiner, 350)
  }

  window.fermerVictoire = function() {
    document.getElementById('victoire-overlay').classList.remove('visible')
  }
  </script>
</body>
</html>
