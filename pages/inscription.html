<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte</title>
  <link rel="stylesheet" href="../style/style.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="centered">
    <div class="card card-sm">
      <h1>Créer un compte</h1>
      <p class="subtitle">Choisissez un nom d'utilisateur et un mot de passe.</p>
      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" placeholder="ex: dupont42" autocomplete="off" maxlength="20">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="6 caractères minimum">
      <label for="password2">Confirmer le mot de passe</label>
      <input type="password" id="password2" placeholder="Répétez le mot de passe">
      <button class="btn btn-primary btn-full" id="btn" onclick="inscrire()">Créer le compte</button>
      <div class="msg" id="msg"></div>
      <a class="lien" href="connexion.html">Déjà un compte ? Se connecter</a>
      <a class="lien lien-gris" href="../index.html">← Retour à l'accueil</a>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
    import { chargerHeader, chargerFooter, appliquerTheme } from '../script/header.js'
    appliquerTheme()
    chargerHeader('../')
    chargerFooter('../')
    const db  = createClient('https://uqjciekcfrxscfwztttt.supabase.co', 'sb_publishable_Ly-L4hecBE_r-k4qd5zTkQ_VmaKUASz')
    const msg = document.getElementById('msg')
    const btn = document.getElementById('btn')
    function afficherMsg(texte, type) { msg.textContent = texte; msg.className = 'msg ' + type }
    window.inscrire = async function() {
      const username  = document.getElementById('username').value.trim()
      const password  = document.getElementById('password').value
      const password2 = document.getElementById('password2').value
      
      if (!username) return afficherMsg("Veuillez entrer un nom d'utilisateur.", 'err')
      if (username.length < 3 || username.length > 20) return afficherMsg('Le nom d\'utilisateur doit faire entre 3 et 20 caractères.', 'err')
      if (password.length < 6) return afficherMsg('Le mot de passe doit faire au moins 6 caractères.', 'err')
      if (password !== password2) return afficherMsg('Les mots de passe ne correspondent pas.', 'err')
      btn.disabled = true; btn.textContent = 'Création en cours…'
      const { data, error } = await db.auth.signUp({ email: username + '@gmail.com', password })
      if (error) {
        btn.disabled = false; btn.textContent = 'Créer le compte'
        return afficherMsg(error.message.includes('already registered') ? "Ce nom d'utilisateur est déjà pris." : 'Erreur : ' + error.message, 'err')
      }
      const { error: errProfil } = await db.from('profils').insert([{ user_id: data.user.id, username, niveau: 'commun' }])
      btn.disabled = false; btn.textContent = 'Créer le compte'
      afficherMsg(errProfil ? 'Compte créé mais erreur profil : ' + errProfil.message : 'Compte créé ! Vous pouvez maintenant vous connecter.', errProfil ? 'err' : 'ok')
    }
  </script>
</body>
</html>
