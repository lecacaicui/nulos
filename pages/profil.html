<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil</title>
  <link rel="stylesheet" href="../style/style.css">
  <script>
  (function(){
    var t = localStorage.getItem('theme_couleurs');
    if (!t) return;
    try {
      var c = JSON.parse(t);
      var r = document.documentElement.style;
      r.setProperty('--couleur-fond', c.couleur_fond);
      r.setProperty('--couleur-conteneur', c.couleur_conteneur);
      r.setProperty('--couleur-bordure', c.couleur_bordure);
      r.setProperty('--couleur-bouton', c.couleur_bouton);
      var h = c.couleur_fond.replace('#','');
      var lum = (0.299*parseInt(h.substring(0,2),16) + 0.587*parseInt(h.substring(2,4),16) + 0.114*parseInt(h.substring(4,6),16)) / 255;
      r.setProperty('--couleur-texte', lum < 0.5 ? '#f1f1f1' : '#1a1a1a');
      r.setProperty('--couleur-texte-faible', lum < 0.5 ? '#9ca3af' : '#6b7280');
    } catch(e) {}
  })();
  </script>
  <style>body { visibility: hidden; }</style>
  <style>
    .profil-wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 3rem 1rem 6rem;
    }
    .profil-carte {
      background: var(--couleur-conteneur);
      border: 1px solid var(--couleur-bordure);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      text-align: center;
    }
    .profil-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--couleur-bouton);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 auto 1rem;
    }
    .profil-username { font-size: 1.3rem; font-weight: 700; margin-bottom: .4rem; }
    .profil-niveau { display: inline-block; margin-bottom: 1.5rem; }
    .profil-infos { text-align: left; margin-top: 1.5rem; }
    .profil-ligne {
      display: flex;
      justify-content: space-between;
      padding: .65rem 0;
      border-bottom: 1px solid var(--couleur-bordure);
      font-size: .9rem;
    }
    .profil-ligne:last-child { border-bottom: none; }
    .profil-ligne .label { color: var(--couleur-texte-faible); }
    .profil-ligne .valeur { font-weight: 600; color: var(--couleur-texte); }
    a.retour { color: var(--couleur-bouton); text-decoration: none; font-size: .9rem; display: inline-block; margin-bottom: 1.5rem; }
    a.retour:hover { text-decoration: underline; }

    .profil-badges { margin-top: 1.5rem; }
    .profil-badges h2 {
      font-size: 1rem;
      color: var(--couleur-texte-faible);
      margin-bottom: 1rem;
      font-weight: 600;
      text-align: left;
    }
    .badges-grille {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .75rem;
    }
    .badge-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
      background: var(--couleur-conteneur);
      border: 1px solid var(--couleur-bordure);
      border-radius: 12px;
      padding: 1rem .5rem;
    }
    .badge-tile-img { width: 56px; height: 56px; object-fit: contain; }
    .badge-tile-label { font-size: .75rem; font-weight: 600; text-align: center; color: var(--couleur-texte); }
    .badge-tile-verrouille { opacity: .35; filter: grayscale(1); }
    @media (max-width: 560px) {
      .badges-grille { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="profil-wrap">
      <a class="retour" href="../index.html">← Retour à l'accueil</a>
      <div class="profil-carte">
        <div class="profil-avatar" id="profil-avatar">?</div>
        <div class="profil-username" id="profil-username">—</div>
        <span class="header-tag tag-commun" id="profil-niveau">—</span>

        <div class="profil-infos">
          <div class="profil-ligne">
            <span class="label">Nom d'utilisateur</span>
            <span class="valeur" id="info-username">—</span>
          </div>
          <div class="profil-ligne">
            <span class="label">Niveau du compte</span>
            <span class="valeur" id="info-niveau">—</span>
          </div>
        </div>
      </div>

      <div class="profil-badges">
        <h2>🏅 Badges</h2>
        <div class="badges-grille" id="badges-grille">
          <div style="grid-column:1/-1;font-size:.85rem;color:var(--couleur-texte-faible);">Chargement…</div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
    import { chargerHeader, chargerFooter, appliquerTheme } from '../script/header.js'
    import { BADGES, chargerBadgesUtilisateur } from '../script/badges.js'

    const db = createClient('https://uqjciekcfrxscfwztttt.supabase.co', 'sb_publishable_Ly-L4hecBE_r-k4qd5zTkQ_VmaKUASz')

    ;(async () => {
      if (!localStorage.getItem('username')) {
        window.location.href = 'connexion.html'
        return
      }
      document.body.style.setProperty('visibility', 'visible', 'important')
      appliquerTheme()
      await chargerHeader('../')
      await chargerFooter('../')

      const username = localStorage.getItem('username')
      const niveau   = localStorage.getItem('niveau') ?? 'commun'

      document.getElementById('profil-avatar').textContent = username.charAt(0).toUpperCase()
      document.getElementById('profil-username').textContent = username
      document.getElementById('info-username').textContent = username
      document.getElementById('info-niveau').textContent = niveau

      const tagNiveau = document.getElementById('profil-niveau')
      tagNiveau.textContent = niveau
      tagNiveau.className = 'header-tag tag-' + niveau

      const { data: session } = await db.auth.getUser()
      await afficherBadges(session?.user?.id ?? null)
    })()

    async function afficherBadges(userId) {
      const obtenus = await chargerBadgesUtilisateur(userId)
      const grille = document.getElementById('badges-grille')
      grille.innerHTML = BADGES.map(b => {
        const ok = obtenus.has(b.id)
        return `
          <div class="badge-tile ${ok ? '' : 'badge-tile-verrouille'}" title="${b.description}">
            <img class="badge-tile-img" src="../pictures/${b.image}" alt="${b.titre}">
            <span class="badge-tile-label">${b.titre}</span>
          </div>`
      }).join('')
    }
  </script>
</body>
</html>
