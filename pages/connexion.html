<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion</title>
  <link rel="stylesheet" href="../style/style.css">
  <style>body { visibility: hidden; }</style>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="centered">
    <div class="card card-sm">
      <h1>Connexion</h1>
      <p class="subtitle">Entrez votre nom d'utilisateur et mot de passe.</p>
      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" placeholder="ex: dupont42" autocomplete="off" maxlength="20">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Votre mot de passe">
      <button class="btn btn-primary btn-full" id="btn" onclick="connecter()">Se connecter</button>
      <div class="msg" id="msg"></div>
      <a class="lien" href="inscription.html">Pas encore de compte ? S'inscrire</a>
      <a class="lien lien-gris" href="../index.html">← Retour à l'accueil</a>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
    import { chargerHeader, chargerFooter, appliquerTheme } from '../script/header.js'

    const db = createClient('https://uqjciekcfrxscfwztttt.supabase.co', 'sb_publishable_Ly-L4hecBE_r-k4qd5zTkQ_VmaKUASz')
    const msg = document.getElementById('msg')
    const btn = document.getElementById('btn')
    function afficherMsg(texte, type) { msg.textContent = texte; msg.className = 'msg ' + type }
    let tentativesEchouees = 0

    ;(async () => {
      await appliquerTheme()
      await chargerHeader('../')
      await chargerFooter('../')
      document.body.style.visibility = ''
    })()

    window.connecter = async function() {
      const username = document.getElementById('username').value.trim()
      const password = document.getElementById('password').value
      if (!username || !password) return afficherMsg('Veuillez remplir tous les champs.', 'err')
      if (tentativesEchouees >= 3) return afficherMsg('Trop de tentatives. Réessayez dans quelques instants.', 'err')
      btn.disabled = true; btn.textContent = 'Connexion en cours…'
      const { data, error } = await db.auth.signInWithPassword({ email: username + '@gmail.com', password })
      btn.disabled = false; btn.textContent = 'Se connecter'
      if (error) {
        tentativesEchouees++
        if (tentativesEchouees >= 3) {
          afficherMsg('Trop de tentatives. Réessayez dans 30 secondes.', 'err')
          setTimeout(() => { tentativesEchouees = 0 }, 30000)
        } else {
          afficherMsg("Nom d'utilisateur ou mot de passe incorrect.", 'err')
        }
        return
      }
      tentativesEchouees = 0
      const { data: profil } = await db.from('profils').select('niveau').eq('user_id', data.user.id).single()
      localStorage.setItem('niveau', profil?.niveau ?? 'commun')
      localStorage.setItem('username', username)
      afficherMsg('Connecté ! Redirection…', 'ok')
      setTimeout(() => window.location.href = '../index.html', 1000)
    }
  </script>
</body>
</html>
