<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrabble — Joker</title>
  <link rel="stylesheet" href="../style/style.css">
  <script>
  (function(){
    // Page Scrabble : couleurs fixes, indépendantes du thème global du site.
    var r = document.documentElement.style;
    r.setProperty('--couleur-fond', '#61ab81');
    r.setProperty('--couleur-conteneur', '#8ebd94');
    r.setProperty('--couleur-bordure', '#3f3f46');
    r.setProperty('--couleur-bouton', '#3b82f6');
    var lum = (0.299*0x61 + 0.587*0xab + 0.114*0x81) / 255;
    r.setProperty('--couleur-texte', lum < 0.5 ? '#f1f1f1' : '#1a1a1a');
    r.setProperty('--couleur-texte-faible', lum < 0.5 ? '#9ca3af' : '#6b7280');
  })();
  </script>
  <style>body { visibility: hidden; }</style>
  <style>
    .scrabble-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1rem 6rem;
    }
    .scrabble-wrap h1 { margin-bottom: .25rem; }
    .scrabble-wrap .subtitle { margin-bottom: 1.5rem; }

    .input-row {
      display: flex;
      gap: .75rem;
      align-items: flex-end;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .input-row input[type="text"] {
      flex: 1;
      min-width: 0;
      font-size: 1.1rem;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .input-row button {
      white-space: nowrap;
    }

    .resultats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: .5rem;
    }
    .result-card {
      background: var(--couleur-conteneur);
      border: 1px solid var(--couleur-bordure);
      border-radius: 8px;
      padding: .6rem .75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .25rem;
    }
    .result-lettre {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--couleur-bouton);
    }
    .result-mot {
      font-size: .8rem;
      color: var(--couleur-texte);
      letter-spacing: .08em;
      word-break: break-all;
      text-align: center;
    }
    .empty {
      color: var(--couleur-texte-faible);
      font-size: .9rem;
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="scrabble-wrap">
      <h1>Scrabble — Joker</h1>
      <p class="subtitle">Entrez vos lettres (sans le joker) pour voir toutes les combinaisons possibles.</p>

      <div class="input-row">
        <input
          type="text"
          id="lettres"
          placeholder="ex: AEIOU"
          maxlength="20"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          oninput="this.value = this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter') calculer()"
        >
        <div class="joker-field">
          <label for="nb-jokers" style="margin:0 0 .3rem; font-size:.8rem;">Jokers</label>
          <input type="number" id="nb-jokers" value="1" min="1" max="3"
            style="width:64px; padding:.6rem .5rem; text-align:center; font-size:1rem;">
        </div>
        <button class="btn btn-primary" onclick="calculer()">Calculer</button>
        <button class="btn btn-secondary" onclick="effacer()">Effacer</button>
      </div>

      <div id="resultats"></div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { chargerHeader, chargerFooter } from '../script/header.js'

    ;(async () => {
      if (!localStorage.getItem('username')) {
        window.location.href = 'connexion.html'
        return
      }
      document.body.style.setProperty('visibility', 'visible', 'important')
      await chargerHeader('../')
      await chargerFooter('../')
    })()

    const ALP = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')

    // Traduction fidèle de joker(tex) en Python :
    // pour chaque lettre de l'alphabet, on ajoute cette lettre aux lettres
    // saisies, on trie l'ensemble, et on affiche le résultat.
    // Génère toutes les combinaisons de `n` jokers parmi l'alphabet (avec répétition).
    // Ex : 2 jokers → AA, AB, AC … ZZ (351 combinaisons)
    function combinaisonsJokers(n) {
      let résultats = [[]]
      for (let j = 0; j < n; j++) {
        const suivant = []
        for (const combo of résultats) {
          const debut = combo.length ? ALP.indexOf(combo[combo.length - 1]) : 0
          for (let i = debut; i < ALP.length; i++) {
            suivant.push([...combo, ALP[i]])
          }
        }
        résultats = suivant
      }
      return résultats
    }

    window.calculer = function() {
      const tex = document.getElementById('lettres').value.trim().toUpperCase()
      const el  = document.getElementById('resultats')
      const nbJokers = Math.max(1, Math.min(3, parseInt(document.getElementById('nb-jokers').value) || 1))

      if (!tex) {
        el.innerHTML = '<p class="empty">Entrez au moins une lettre.</p>'
        return
      }

      const lettres = tex.replace(/[^A-Z]/g, '').split('')
      const combos  = combinaisonsJokers(nbJokers)

      const cards = combos.map(jokers => {
        const label       = jokers.join('+')
        const combinaison = [...lettres, ...jokers].sort().join(' ')
        return `
          <div class="result-card">
            <span class="result-lettre">${label}</span>
            <span class="result-mot">${combinaison}</span>
          </div>`
      }).join('')

      el.innerHTML = cards
    }

    window.effacer = function() {
      document.getElementById('lettres').value = ''
      document.getElementById('resultats').innerHTML = ''
    }
  </script>
</body>
</html>
