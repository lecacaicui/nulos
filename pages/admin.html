<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration</title>
  <link rel="stylesheet" href="../style/style.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="main-admin">
    <div id="acces-refuse" class="acces-refuse" style="display:none">
      ⛔ Accès refusé — réservé aux administrateurs.<br><br>
      <a href="../index.html">← Retour à l'accueil</a>
    </div>

    <div id="contenu" style="display:none">
      <div class="page-header">
        <div>
          <h1>Administration</h1>
          <a class="retour" href="hub.html">← Retour au hub</a>
        </div>
        <span class="badge">Admin</span>
      </div>
      <div class="card-table">
        <table>
          <thead>
            <tr><th>Nom d'utilisateur</th><th>Niveau actuel</th><th>Changer le niveau</th><th>Action</th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
    import { chargerHeader, chargerFooter } from '../script/header.js'
    chargerHeader('../')
    chargerFooter('../')

    const SUPABASE_URL = 'https://uqjciekcfrxscfwztttt.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_Ly-L4hecBE_r-k4qd5zTkQ_VmaKUASz'
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    if (localStorage.getItem('niveau') !== 'admin') {
      document.getElementById('acces-refuse').style.display = 'block'
    } else {
      document.getElementById('contenu').style.display = 'block'
      chargerUtilisateurs()
    }

    async function chargerUtilisateurs() {
      const { data, error } = await db.from('profils').select('*').order('username')
      if (error) return
      const tbody = document.getElementById('tbody')
      tbody.innerHTML = ''
      data.forEach(u => {
        const tagClass = u.niveau === 'admin' ? 'tag-admin' : u.niveau === 'plus' ? 'tag-plus' : 'tag-commun'
        tbody.innerHTML += `
          <tr>
            <td>${u.username}</td>
            <td><span class="tag ${tagClass}">${u.niveau}</span></td>
            <td>
              <select id="sel-${u.id}">
                <option value="commun" ${u.niveau === 'commun' ? 'selected' : ''}>commun</option>
                <option value="plus"   ${u.niveau === 'plus'   ? 'selected' : ''}>plus</option>
                <option value="admin"  ${u.niveau === 'admin'  ? 'selected' : ''}>admin</option>
              </select>
            </td>
            <td>
              <button class="btn-save" onclick="sauvegarder('${u.id}')">Sauvegarder</button>
              <span class="msg-inline" id="msg-${u.id}"></span>
            </td>
          </tr>`
      })
    }

    window.sauvegarder = async function(id) {
      const nouveauNiveau = document.getElementById('sel-' + id).value
      const msgEl = document.getElementById('msg-' + id)
      const { error } = await db.from('profils').update({ niveau: nouveauNiveau }).eq('id', id)
      if (error) { msgEl.textContent = '✗ Erreur'; msgEl.className = 'msg-inline err' }
      else { msgEl.textContent = '✓ Sauvegardé'; msgEl.className = 'msg-inline ok'; setTimeout(() => chargerUtilisateurs(), 800) }
    }
  </script>
</body>
</html>
