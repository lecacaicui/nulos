<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shikaku</title>
  <link rel="stylesheet" href="../style/style.css">
  <script>
  (function(){
    var t = localStorage.getItem('theme_couleurs');
    if (!t) return;
    try {
      var c = JSON.parse(t);
      var r = document.documentElement.style;
      r.setProperty('--couleur-fond', c.couleur_fond);
      r.setProperty('--couleur-conteneur', c.couleur_conteneur);
      r.setProperty('--couleur-bordure', c.couleur_bordure);
      r.setProperty('--couleur-bouton', c.couleur_bouton);
      var h = c.couleur_fond.replace('#','');
      var lum = (0.299*parseInt(h.substring(0,2),16) + 0.587*parseInt(h.substring(2,4),16) + 0.114*parseInt(h.substring(4,6),16)) / 255;
      r.setProperty('--couleur-texte', lum < 0.5 ? '#f1f1f1' : '#1a1a1a');
      r.setProperty('--couleur-texte-faible', lum < 0.5 ? '#9ca3af' : '#6b7280');
    } catch(e) {}
  })();
  </script>
  <style>body { visibility: hidden; }</style>
  <style>
    .shikaku-wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1rem 7rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .shikaku-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .shikaku-header h1 { margin-bottom: 0; }

    .niveau-btns {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .niveau-btn {
      padding: .35rem .9rem;
      border-radius: 7px;
      font-size: .82rem;
      font-weight: 600;
      border: 1px solid var(--couleur-bordure);
      background: var(--couleur-fond);
      color: var(--couleur-texte);
      cursor: pointer;
      transition: filter .15s, background .15s;
    }
    .niveau-btn:hover { filter: brightness(.92); }
    .niveau-btn.actif {
      background: var(--couleur-bouton);
      color: white;
      border-color: var(--couleur-bouton);
    }

    .shikaku-info {
      font-size: .85rem;
      color: var(--couleur-texte-faible);
      text-align: center;
    }

    /* ===== Grille ===== */
    .grille-container {
      position: relative;
      user-select: none;
      touch-action: none;
    }
    canvas {
      display: block;
      border-radius: 6px;
      cursor: crosshair;
    }

    /* ===== Contrôles ===== */
    .shikaku-controls {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ===== Message victoire ===== */
    .victoire-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .victoire-overlay.visible { display: flex; }
    .victoire-carte {
      background: var(--couleur-conteneur);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 8px 30px rgba(0,0,0,.3);
    }
    .victoire-emoji { font-size: 3rem; margin-bottom: .75rem; }
    .victoire-titre { font-size: 1.4rem; font-weight: 700; margin-bottom: .5rem; }
    .victoire-sous { font-size: .9rem; color: var(--couleur-texte-faible); margin-bottom: 1.5rem; }
    .victoire-btns { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="shikaku-wrap">
      <div class="shikaku-header">
        <h1>Shikaku</h1>
        <div class="niveau-btns">
          <button class="niveau-btn actif" onclick="chargerNiveau(0)">Facile</button>
          <button class="niveau-btn" onclick="chargerNiveau(1)">Moyen</button>
          <button class="niveau-btn" onclick="chargerNiveau(2)">Difficile</button>
        </div>
      </div>

      <p class="shikaku-info">
        Divisez la grille en rectangles. Chaque rectangle doit contenir exactement un chiffre, qui indique son aire.
        Cliquez-glissez pour dessiner un rectangle.
      </p>

      <div class="grille-container">
        <canvas id="canvas"></canvas>
      </div>

      <div class="shikaku-controls">
        <button class="btn btn-secondary" onclick="annuler()">↩ Annuler</button>
        <button class="btn btn-secondary" onclick="reinitialiser()">🔄 Réinitialiser</button>
        <button class="btn btn-primary" onclick="verifier()">✓ Vérifier</button>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <!-- Overlay victoire -->
  <div class="victoire-overlay" id="victoire-overlay">
    <div class="victoire-carte">
      <div class="victoire-emoji">🎉</div>
      <div class="victoire-titre">Bravo !</div>
      <div class="victoire-sous" id="victoire-sous">Puzzle résolu !</div>
      <div class="victoire-btns">
        <button class="btn btn-secondary" onclick="fermerVictoire()">Fermer</button>
        <button class="btn btn-primary" onclick="niveauSuivant()">Niveau suivant →</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { chargerHeader, chargerFooter, appliquerTheme } from '../script/header.js'

    ;(async () => {
      if (!localStorage.getItem('username')) {
        window.location.href = 'connexion.html'
        return
      }
      document.body.style.setProperty('visibility', 'visible', 'important')
      appliquerTheme()
      await chargerHeader('../')
      await chargerFooter('../')
      chargerNiveau(0)
    })()
  </script>

  <script>
  // ============================================================
  // Puzzles Shikaku
  // Format : { taille: N, indices: [[ligne, col, valeur], ...] }
  // La solution est vérifiée algorithmiquement (pas stockée).
  // ============================================================
  const NIVEAUX = [
    // --- Facile : 5×5 ---
    {
      taille: 5,
      indices: [
        [0,0,6], [0,3,2],
        [1,4,4],
        [2,0,2],
        [3,1,4],
        [4,4,7]
      ]
    },
    // --- Moyen : 7×7 ---
    {
      taille: 7,
      indices: [
        [0,0,4], [0,3,2], [0,6,3],
        [1,5,4],
        [2,0,6], [2,4,2],
        [3,6,4],
        [4,1,3], [4,4,4],
        [5,0,2], [5,6,6],
        [6,2,5], [6,5,2]
      ]
    },
    // --- Difficile : 9×9 ---
    {
      taille: 9,
      indices: [
        [0,0,4], [0,4,3], [0,7,4],
        [1,2,4], [1,6,2],
        [2,0,3], [2,5,6],
        [3,3,4], [3,8,6],
        [4,1,6], [4,6,4],
        [5,0,2], [5,4,4],
        [6,2,9], [6,7,2],
        [7,0,4], [7,5,6],
        [8,3,3], [8,8,4]
      ]
    }
  ]

  // Palette de couleurs pour les rectangles (pastel, lisibles sur les deux thèmes)
  const COULEURS = [
    '#7eb8d4','#c8a96e','#8fbd8f','#c47a7a','#9b7bc4',
    '#6ec8c8','#d4a07e','#7eb87e','#c47aa0','#7a9bc4',
    '#d4c87e','#b47eb4','#7ebdb4','#c4927e','#8fa0c8'
  ]

  // ============================================================
  // État du jeu
  // ============================================================
  let niveau     = null   // puzzle actif
  let niveauIdx  = 0
  let TAILLE     = 5
  let CELL       = 64     // pixels par cellule
  let rectangles = []     // { r1, c1, r2, c2, couleur }
  let historique = []     // pour annuler
  let dessin     = null   // rectangle en cours { r1, c1, r2, c2 }
  let canvas, ctx

  // ============================================================
  // Chargement d'un niveau
  // ============================================================
  window.chargerNiveau = function(idx) {
    niveauIdx  = idx
    niveau     = NIVEAUX[idx]
    TAILLE     = niveau.taille
    rectangles = []
    historique = []
    dessin     = null

    // Taille de cellule adaptée à l'écran
    const maxW = Math.min(window.innerWidth - 40, 520)
    CELL = Math.floor(maxW / TAILLE)

    canvas = document.getElementById('canvas')
    ctx    = canvas.getContext('2d')
    canvas.width  = TAILLE * CELL
    canvas.height = TAILLE * CELL

    // Mise à jour des boutons de niveau
    document.querySelectorAll('.niveau-btn').forEach((b, i) => {
      b.classList.toggle('actif', i === idx)
    })

    fermerVictoire()
    dessiner()
    bindEvents()
  }

  // ============================================================
  // Dessin du canvas
  // ============================================================
  function dessiner() {
    const style = getComputedStyle(document.documentElement)
    const cFond       = style.getPropertyValue('--couleur-fond').trim()       || '#f5f5f5'
    const cConteneur  = style.getPropertyValue('--couleur-conteneur').trim()  || '#ffffff'
    const cBordure    = style.getPropertyValue('--couleur-bordure').trim()    || '#e5e7eb'
    const cTexte      = style.getPropertyValue('--couleur-texte').trim()      || '#1a1a1a'

    // Fond
    ctx.fillStyle = cConteneur
    ctx.fillRect(0, 0, canvas.width, canvas.height)

    // Rectangles posés
    rectangles.forEach(rec => {
      const x = rec.c1 * CELL, y = rec.r1 * CELL
      const w = (rec.c2 - rec.c1 + 1) * CELL, h = (rec.r2 - rec.r1 + 1) * CELL
      ctx.fillStyle = rec.couleur + 'bb'  // semi-transparent
      ctx.fillRect(x, y, w, h)
      ctx.strokeStyle = rec.couleur
      ctx.lineWidth = 2
      ctx.strokeRect(x + 1, y + 1, w - 2, h - 2)
    })

    // Rectangle en cours de dessin
    if (dessin) {
      const x = dessin.c1 * CELL, y = dessin.r1 * CELL
      const w = (dessin.c2 - dessin.c1 + 1) * CELL, h = (dessin.r2 - dessin.r1 + 1) * CELL
      ctx.fillStyle = 'rgba(100,150,255,0.25)'
      ctx.fillRect(x, y, w, h)
      ctx.strokeStyle = 'rgba(100,150,255,0.8)'
      ctx.lineWidth = 2
      ctx.setLineDash([5, 3])
      ctx.strokeRect(x + 1, y + 1, w - 2, h - 2)
      ctx.setLineDash([])
    }

    // Grille
    ctx.strokeStyle = cBordure
    ctx.lineWidth = 1
    for (let i = 0; i <= TAILLE; i++) {
      ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke()
      ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke()
    }

    // Indices (chiffres)
    niveau.indices.forEach(([r, c, v]) => {
      const cx = c * CELL + CELL / 2, cy = r * CELL + CELL / 2
      // Fond blanc/foncé derrière le chiffre
      ctx.fillStyle = cConteneur
      ctx.beginPath()
      ctx.arc(cx, cy, CELL * 0.3, 0, Math.PI * 2)
      ctx.fill()
      ctx.strokeStyle = cBordure
      ctx.lineWidth = 1.5
      ctx.stroke()
      // Chiffre
      ctx.fillStyle = cTexte
      ctx.font = `bold ${Math.round(CELL * 0.38)}px system-ui, sans-serif`
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText(String(v), cx, cy)
    })
  }

  // ============================================================
  // Événements souris / tactile
  // ============================================================
  let startCell = null

  function cellDepuis(e) {
    const rect = canvas.getBoundingClientRect()
    const scaleX = canvas.width  / rect.width
    const scaleY = canvas.height / rect.height
    let cx, cy
    if (e.touches) {
      cx = (e.touches[0].clientX - rect.left) * scaleX
      cy = (e.touches[0].clientY - rect.top)  * scaleY
    } else {
      cx = (e.clientX - rect.left) * scaleX
      cy = (e.clientY - rect.top)  * scaleY
    }
    return {
      r: Math.max(0, Math.min(TAILLE - 1, Math.floor(cy / CELL))),
      c: Math.max(0, Math.min(TAILLE - 1, Math.floor(cx / CELL)))
    }
  }

  function rectNormalise(r1, c1, r2, c2) {
    return {
      r1: Math.min(r1, r2), c1: Math.min(c1, c2),
      r2: Math.max(r1, r2), c2: Math.max(c1, c2)
    }
  }

  function bindEvents() {
    canvas.onmousedown  = e => { startCell = cellDepuis(e); dessin = { ...startCell, ...startCell, r2: startCell.r, c2: startCell.c }; dessiner() }
    canvas.onmousemove  = e => { if (!startCell) return; const c = cellDepuis(e); dessin = rectNormalise(startCell.r, startCell.c, c.r, c.c); dessiner() }
    canvas.onmouseup    = e => { if (!startCell) return; const c = cellDepuis(e); poserRectangle(rectNormalise(startCell.r, startCell.c, c.r, c.c)); startCell = null; dessin = null }
    canvas.onmouseleave = ()=> { if (startCell) { dessin = null; startCell = null; dessiner() } }
    canvas.ontouchstart = e => { e.preventDefault(); startCell = cellDepuis(e); dessin = { r1: startCell.r, c1: startCell.c, r2: startCell.r, c2: startCell.c }; dessiner() }
    canvas.ontouchmove  = e => { e.preventDefault(); if (!startCell) return; const c = cellDepuis(e); dessin = rectNormalise(startCell.r, startCell.c, c.r, c.c); dessiner() }
    canvas.ontouchend   = e => { e.preventDefault(); if (!startCell) return; poserRectangle(dessin); startCell = null; dessin = null }
  }

  // ============================================================
  // Logique de jeu
  // ============================================================
  function poserRectangle(rec) {
    if (!rec) return
    // Supprimer les rectangles existants qui chevauchent cette zone
    const avant = rectangles.slice()
    rectangles = rectangles.filter(r =>
      rec.r2 < r.r1 || rec.r1 > r.r2 || rec.c2 < r.c1 || rec.c1 > r.c2
    )
    // Choisir une couleur non déjà utilisée au voisinage
    const couleursUtilisees = new Set(rectangles.map(r => r.couleur))
    const couleur = COULEURS.find(c => !couleursUtilisees.has(c)) || COULEURS[rectangles.length % COULEURS.length]

    historique.push(avant)
    rectangles.push({ ...rec, couleur })
    dessiner()
  }

  window.annuler = function() {
    if (historique.length === 0) return
    rectangles = historique.pop()
    dessiner()
  }

  window.reinitialiser = function() {
    historique.push(rectangles.slice())
    rectangles = []
    dessiner()
  }

  // ============================================================
  // Vérification
  // ============================================================
  window.verifier = function() {
    // 1. Toute la grille doit être couverte exactement une fois
    const couverture = Array.from({ length: TAILLE }, () => Array(TAILLE).fill(0))
    for (const rec of rectangles) {
      for (let r = rec.r1; r <= rec.r2; r++) {
        for (let c = rec.c1; c <= rec.c2; c++) {
          couverture[r][c]++
        }
      }
    }
    for (let r = 0; r < TAILLE; r++) {
      for (let c = 0; c < TAILLE; c++) {
        if (couverture[r][c] !== 1) {
          flashErreur('La grille n\'est pas entièrement et uniquement couverte.')
          return
        }
      }
    }

    // 2. Chaque rectangle doit contenir exactement un indice,
    //    et l'aire du rectangle doit égaler la valeur de cet indice.
    for (const rec of rectangles) {
      const aire = (rec.r2 - rec.r1 + 1) * (rec.c2 - rec.c1 + 1)
      const indicesDedans = niveau.indices.filter(([r, c]) =>
        r >= rec.r1 && r <= rec.r2 && c >= rec.c1 && c <= rec.c2
      )
      if (indicesDedans.length !== 1) {
        flashErreur('Chaque rectangle doit contenir exactement un chiffre.')
        return
      }
      if (indicesDedans[0][2] !== aire) {
        flashErreur(`Le rectangle autour du ${indicesDedans[0][2]} a une aire de ${aire} au lieu de ${indicesDedans[0][2]}.`)
        return
      }
    }

    // 3. Vérifier que tous les indices sont couverts
    for (const [r, c] of niveau.indices) {
      if (couverture[r][c] !== 1) {
        flashErreur('Tous les chiffres doivent être dans un rectangle.')
        return
      }
    }

    afficherVictoire()
  }

  function flashErreur(msg) {
    // Teinte rouge brève sur le canvas
    ctx.fillStyle = 'rgba(220,38,38,0.15)'
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    setTimeout(dessiner, 400)
    // Petite alerte sous la grille (réutilise un div temporaire)
    let el = document.getElementById('shikaku-err')
    if (!el) {
      el = document.createElement('p')
      el.id = 'shikaku-err'
      el.style.cssText = 'color:#ef4444;font-size:.82rem;text-align:center;margin-top:-.5rem;'
      document.querySelector('.shikaku-controls').after(el)
    }
    el.textContent = msg
    clearTimeout(el._t)
    el._t = setTimeout(() => el.textContent = '', 3000)
  }

  function afficherVictoire() {
    const noms = ['Facile', 'Moyen', 'Difficile']
    document.getElementById('victoire-sous').textContent =
      `Puzzle ${noms[niveauIdx]} résolu ! 🎊`
    document.getElementById('victoire-overlay').classList.add('visible')
  }

  window.fermerVictoire = function() {
    document.getElementById('victoire-overlay').classList.remove('visible')
  }

  window.niveauSuivant = function() {
    const suivant = (niveauIdx + 1) % NIVEAUX.length
    chargerNiveau(suivant)
  }
  </script>
</body>
</html>
