<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 2.5rem 3rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      width: 100%;
      max-width: 400px;
    }

    h1 { font-size: 1.6rem; margin-bottom: .4rem; }

    .subtitle {
      color: #666;
      font-size: .9rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: .3rem;
    }

    input {
      width: 100%;
      padding: .65rem .9rem;
      border: 1px solid #ddd;
      border-radius: 7px;
      font-size: .95rem;
      margin-bottom: 1.1rem;
      background: #fafafa;
      transition: border-color .15s;
    }

    input:focus { outline: none; border-color: #2563eb; background: white; }

    button {
      width: 100%;
      padding: .75rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }

    .msg {
      margin-top: 1rem;
      padding: .65rem .9rem;
      border-radius: 7px;
      font-size: .9rem;
      display: none;
    }

    .msg.ok  { background: #dcfce7; color: #15803d; display: block; }
    .msg.err { background: #fee2e2; color: #b91c1c; display: block; }

    .lien {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: .9rem;
      color: #2563eb;
      text-decoration: none;
    }

    .lien:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Créer un compte</h1>
    <p class="subtitle">Choisissez un nom d'utilisateur et un mot de passe.</p>

    <label for="username">Nom d'utilisateur</label>
    <input type="text" id="username" placeholder="ex: dupont42" autocomplete="off">

    <label for="password">Mot de passe</label>
    <input type="password" id="password" placeholder="6 caractères minimum">

    <label for="password2">Confirmer le mot de passe</label>
    <input type="password" id="password2" placeholder="Répétez le mot de passe">

    <button id="btn" onclick="inscrire()">Créer le compte</button>
    <div class="msg" id="msg"></div>

    <a class="lien" href="connexion.html">Déjà un compte ? Se connecter</a>
    <a class="lien" href="index.html" style="color:#999">← Retour à l'accueil</a>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const SUPABASE_URL = 'https://uqjciekcfrxscfwztttt.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_Ly-L4hecBE_r-k4qd5zTkQ_VmaKUASz'
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    const msg = document.getElementById('msg')
    const btn = document.getElementById('btn')

    function afficherMsg(texte, type) {
      msg.textContent = texte
      msg.className = 'msg ' + type
    }

    window.inscrire = async function() {
      const username  = document.getElementById('username').value.trim()
      const password  = document.getElementById('password').value
      const password2 = document.getElementById('password2').value

      if (!username) return afficherMsg('Veuillez entrer un nom d\'utilisateur.', 'err')
      if (password.length < 6) return afficherMsg('Le mot de passe doit faire au moins 6 caractères.', 'err')
      if (password !== password2) return afficherMsg('Les mots de passe ne correspondent pas.', 'err')

      btn.disabled = true
      btn.textContent = 'Création en cours…'

      const email = username + '@site.local'
      const { error } = await db.auth.signUp({ email, password })

      btn.disabled = false
      btn.textContent = 'Créer le compte'

      if (error) {
        if (error.message.includes('already registered')) {
          afficherMsg('Ce nom d\'utilisateur est déjà pris.', 'err')
        } else {
          afficherMsg('Erreur : ' + error.message, 'err')
        }
      } else {
        afficherMsg('Compte créé ! Vous pouvez maintenant vous connecter.', 'ok')
      }
    }
  </script>
</body>
</html>
