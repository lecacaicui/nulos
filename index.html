<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 4rem;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 2.5rem 3rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      text-align: center;
      width: 100%;
      max-width: 380px;
    }
    h1 { font-size: 1.6rem; margin-bottom: .5rem; }
    p { color: #666; margin-bottom: 2rem; font-size: .95rem; }
    .btn-group { display: flex; flex-direction: column; gap: .75rem; }
    a.btn {
      display: block;
      text-decoration: none;
      padding: .75rem 1.8rem;
      border-radius: 7px;
      font-size: 1rem;
      transition: background .15s;
    }
    a.btn-primary { background: #2563eb; color: white; }
    a.btn-primary:hover { background: #1d4ed8; }
    a.btn-secondary { background: #e5e7eb; color: #1a1a1a; }
    a.btn-secondary:hover { background: #d1d5db; }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <div class="card">
      <h1>Accueil</h1>
      <p>Bienvenue ! Connectez-vous ou créez un compte pour continuer.</p>
      <div class="btn-group">
        <a class="btn btn-primary" href="connexion.html">Se connecter</a>
        <a class="btn btn-secondary" href="inscription.html">Créer un compte</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script>
    fetch('header.html').then(r => r.text()).then(h => document.getElementById('header-placeholder').innerHTML = h)
    fetch('footer.html').then(r => r.text()).then(f => document.getElementById('footer-placeholder').innerHTML = f)
  </script>
</body>
</html>
