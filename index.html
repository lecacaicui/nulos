<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 2.5rem 3rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: .5rem;
    }

    p {
      color: #666;
      margin-bottom: 2rem;
      font-size: .95rem;
    }

    a.btn {
      display: inline-block;
      background: #2563eb;
      color: white;
      text-decoration: none;
      padding: .7rem 1.8rem;
      border-radius: 7px;
      font-size: 1rem;
      transition: background .15s;
    }

    a.btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Accueil</h1>
    <p>Cliquez sur le bouton pour accéder à la page de test.</p>
    <a class="btn" href="test.html">Aller aux tests →</a>
  </div>
</body>
</html>
