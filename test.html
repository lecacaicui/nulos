<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page de Test - BDD</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 2.5rem 3rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      text-align: center;
      width: 100%;
      max-width: 500px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: .5rem;
    }

    p {
      color: #666;
      margin-bottom: 1.5rem;
      font-size: .95rem;
    }

    form {
      display: flex;
      gap: 10px;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      flex: 1;
      padding: .7rem 1rem;
      border: 1px solid #ccc;
      border-radius: 7px;
      font-size: 1rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #2563eb;
    }

    button.btn {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      padding: .7rem 1.5rem;
      border-radius: 7px;
      font-size: 1rem;
      transition: background .15s;
    }

    button.btn:hover { background: #1d4ed8; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      text-align: left;
    }

    th, td {
      padding: .7rem;
      border-bottom: 1px solid #eee;
      font-size: .95rem;
    }

    th {
      color: #666;
      font-weight: 600;
    }

    .retour {
      display: inline-block;
      margin-top: 1.5rem;
      color: #2563eb;
      text-decoration: none;
      font-size: .9rem;
    }
    .retour:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Page de Test</h1>
    <p>Ajoutez des données pour voir le tableau s'agrandir.</p>

    <form id="formulaire-ajout">
      <input type="text" id="champ-nom" placeholder="Entrez une donnée" required>
      <button type="submit" class="btn">Ajouter</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Donnée</th>
        </tr>
      </thead>
      <tbody id="contenu-tableau">
      </tbody>
    </table>

    <a class="retour" href="index.html">← Retour à l'accueil</a>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-client'

    const SUPABASE_URL = 'https://uqjciekcfrxscfwztttt.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_Ly-L4hecBE_r-k4qd5zTkQ_VmaKUASz' 
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    // 1. Fonction pour charger les données
    async function chargerDonnees() {
      const { data, error } = await supabase
        .from('clique')
        .select('*')
        .order('id', { ascending: true })

      if (error) {
        console.error("Erreur de récupération :", error)
        return
      }

      const tbody = document.getElementById('contenu-tableau')
      tbody.innerHTML = ''

      data.forEach(item => {
        // Sécurité : si la colonne ne s'appelle pas "nom", on essaie d'autres variantes courantes
        const valeurAffichee = item.nom || item.donnee || item.texte || "Colonne 'nom' introuvable"
        
        const ligne = `<tr>
          <td>${item.id}</td>
          <td>${valeurAffichee}</td>
        </tr>`
        tbody.innerHTML += ligne
      })
    }

    // 2. Fonction pour envoyer le formulaire
    const form = document.getElementById('formulaire-ajout')
    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const champNom = document.getElementById('champ-nom')
      const nomSaisi = champNom.value

      // ATTENTION : Si ta colonne dans Supabase ne s'appelle pas 'nom', change le mot juste en dessous avant les deux points
      const { error } = await supabase
        .from('clique')
        .insert([{ nom: nomSaisi }]) 

      if (error) {
        alert("Erreur lors de l'envoi : " + error.message)
      } else {
        champNom.value = ''
        chargerDonnees() 
      }
    })

    // Charger les données dès le départ
    chargerDonnees()
  </script>

</body>
</html>
